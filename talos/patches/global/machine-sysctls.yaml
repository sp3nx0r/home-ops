machine:
  sysctls:
    # -- Kubernetes / container requirements --
    fs.inotify.max_user_watches: "1048576"     # Watchdog
    fs.inotify.max_user_instances: "8192"      # Watchdog
    net.ipv4.ping_group_range: 0 2147483647    # Allow unprivileged ping from containers
    user.max_user_namespaces: "11255"          # User Namespaces

    # -- Network performance --
    net.core.default_qdisc: fq                 # Fair queuing — pairs with BBR
    net.core.rmem_max: "67108864"              # 64 MB socket receive buffer for 10G
    net.core.wmem_max: "67108864"              # 64 MB socket send buffer for 10G
    net.ipv4.neigh.default.gc_thresh1: "4096"  # Prevent ARP cache overflows
    net.ipv4.neigh.default.gc_thresh2: "8192"  # Prevent ARP cache overflows
    net.ipv4.neigh.default.gc_thresh3: "16384" # Prevent ARP cache overflows
    net.ipv4.tcp_congestion_control: bbr       # Google BBR — better throughput on 10G
    net.ipv4.tcp_fastopen: "3"                 # TCP Fast Open for client + server
    net.ipv4.tcp_mtu_probing: "1"              # Discover path MTU (needed for jumbo frames)
    net.ipv4.tcp_rmem: 4096 87380 33554432     # TCP receive buffer min/default/max
    net.ipv4.tcp_slow_start_after_idle: "0"    # Preserve congestion window after idle
    net.ipv4.tcp_wmem: 4096 65536 33554432     # TCP send buffer min/default/max
    sunrpc.tcp_max_slot_table_entries: "128"    # NFS max concurrent RPCs
    sunrpc.tcp_slot_table_entries: "128"        # NFS concurrent RPCs per connection

    # -- Network hardening --
    # NOTE: rp_filter intentionally omitted — Cilium needs rp_filter=0 on its
    # interfaces and the kernel uses max(all, interface), so setting all=1
    # would override Cilium's per-interface 0 and break pod networking.
    net.ipv4.icmp_echo_ignore_broadcasts: "1"  # Smurf attack prevention
    net.ipv4.conf.all.accept_source_route: "0" # Disable source routing
    net.ipv6.conf.all.accept_source_route: "0" # Disable source routing (v6)
    net.ipv4.conf.all.accept_redirects: "0"    # Ignore ICMP redirects
    net.ipv6.conf.all.accept_redirects: "0"    # Ignore ICMP redirects (v6)
    net.ipv4.conf.all.send_redirects: "0"      # Don't send redirects — not a router
    net.ipv4.tcp_syncookies: "1"               # SYN flood protection
    net.ipv4.tcp_max_syn_backlog: "2048"       # SYN backlog queue size
    net.ipv4.tcp_synack_retries: "2"           # Reduce SYN-ACK retries (default 5)
    net.ipv4.tcp_syn_retries: "5"              # Explicit default
    net.ipv4.conf.all.log_martians: "1"        # Log impossible-source packets
    net.ipv4.conf.default.log_martians: "1"    # Log impossible-source packets
    net.ipv4.tcp_rfc1337: "1"                  # TIME-WAIT assassination protection

    # -- Kernel hardening --
    kernel.yama.ptrace_scope: "1"              # Restrict ptrace to child processes
    kernel.dmesg_restrict: "1"                 # Restrict dmesg to root
