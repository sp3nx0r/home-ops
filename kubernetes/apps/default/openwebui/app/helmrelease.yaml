---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: openwebui
spec:
  chartRef:
    kind: OCIRepository
    name: openwebui
  interval: 1h
  values:
    controllers:
      openwebui:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: docker.io/openwebui/open-webui
              tag: 0.9.5
            env:
              OLLAMA_BASE_URL: "https://ollama.${SECRET_DOMAIN}"
              ENABLE_OPENAI_API: "false"
              ENABLE_PERSISTENT_CONFIG: "false"
              WEBUI_NAME: "securimancy"
              WEBUI_URL: "https://chat.${SECRET_DOMAIN}"
              ENABLE_SIGNUP: "false"
              ENABLE_OAUTH_SIGNUP: "true"
              ENABLE_COMMUNITY_SHARING: "false"
              ENABLE_WEB_SEARCH: "true"
              WEB_SEARCH_ENGINE: "searxng"
              SEARXNG_QUERY_URL: "http://searxng.default.svc.cluster.local:8080/search?q=<query>"
              AIOHTTP_CLIENT_TIMEOUT: "300"
              OAUTH_PROVIDER_NAME: "PocketID"
              OPENID_PROVIDER_URL: "https://id.${SECRET_DOMAIN}/.well-known/openid-configuration"
              OAUTH_SCOPES: "openid email profile"
              OAUTH_MERGE_ACCOUNTS_BY_EMAIL: "true"
              WEBUI_SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: openwebui-secret
                    key: WEBUI_SECRET_KEY
              OAUTH_CLIENT_ID:
                valueFrom:
                  secretKeyRef:
                    name: openwebui-secret
                    key: OAUTH_CLIENT_ID
              OAUTH_CLIENT_SECRET:
                valueFrom:
                  secretKeyRef:
                    name: openwebui-secret
                    key: OAUTH_CLIENT_SECRET
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: &port 8080
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 256Mi
              limits:
                memory: 1Gi
    service:
      app:
        ports:
          http:
            port: *port
    route:
      app:
        hostnames:
          - "chat.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: openwebui
        globalMounts:
          - path: /app/backend/data
