---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: qbittorrent-gluetun
spec:
  chartRef:
    kind: OCIRepository
    name: qbittorrent-gluetun
  interval: 1h
  values:
    controllers:
      qbittorrent-gluetun:
        strategy: Recreate
        initContainers:
          init-config:
            image:
              repository: docker.io/library/busybox
              tag: latest
            command:
              - /bin/sh
              - -c
              - |
                mkdir -p /config/qBittorrent/logs
                chown -R 1000:1000 /config
                chmod -R u+rwX,g+rwX /config
                rm -f /config/qBittorrent/lockfile
            securityContext:
              runAsUser: 0
              runAsGroup: 0
        containers:
          gluetun:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
            lifecycle:
              postStart:
                exec:
                  command: ["/bin/sh", "-c", "(ip rule del table 51820; ip -6 rule del table 51820) || true"]
            env:
              VPN_SERVICE_PROVIDER: custom
              VPN_TYPE: wireguard
              VPN_PORT_FORWARDING: "on"
              VPN_PORT_FORWARDING_PROVIDER: protonvpn
              VPN_PORT_FORWARDING_UP_COMMAND: >-
                /bin/sh -c 'wget -O- --retry-connrefused
                --post-data "json={\"listen_port\":{{ "{{PORTS}}" }}}"
                http://127.0.0.1:80/api/v2/app/setPreferences 2>&1'
              FIREWALL_INPUT_PORTS: "80,9999"
              FIREWALL_OUTBOUND_SUBNETS: "10.42.0.0/16"
              HEALTH_SERVER_ADDRESS: ":9999"
              HTTPPROXY: off
              SHADOWSOCKS: off
              TZ: America/Chicago
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 9999
                  periodSeconds: 30
                  failureThreshold: 3
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 1Gi
            securityContext:
              runAsUser: 0
              runAsGroup: 0
              allowPrivilegeEscalation: false
              capabilities:
                add: ["NET_ADMIN", "NET_RAW", "CHOWN"]
                drop: ["ALL"]
          app:
            dependsOn: gluetun
            image:
              repository: ghcr.io/home-operations/qbittorrent-libtorrentv1
              tag: 5.2.0
            env:
              QBT_TORRENTING_PORT: &bittorrentPort 50414
              QBT_WEBUI_PORT: &port 80
              TZ: America/Chicago
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v2/app/version
                    port: *port
                  initialDelaySeconds: 0
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *probes
              startup:
                enabled: true
                spec:
                  periodSeconds: 10
                  failureThreshold: 30
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                memory: 8Gi
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: false
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        forceRename: "{{ .Release.Name }}"
        primary: true
        ports:
          http:
            port: *port
      bittorrent:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.5.24"
        externalTrafficPolicy: Cluster
        ports:
          bittorrent-tcp:
            port: *bittorrentPort
            protocol: TCP
    route:
      app:
        hostnames:
          - "qbittorrent-vpn.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      config:
        existingClaim: qbittorrent-gluetun
      media:
        type: nfs
        server: 192.168.5.40
        path: /mnt/tank/media
      tun:
        type: hostPath
        hostPath: /dev/net/tun
        advancedMounts:
          qbittorrent-gluetun:
            gluetun:
              - path: /dev/net/tun
      gluetun-wg:
        type: secret
        name: qbittorrent-gluetun-secret
        advancedMounts:
          qbittorrent-gluetun:
            gluetun:
              - path: /gluetun/wireguard/wg0.conf
                subPath: wg0.conf
                readOnly: true
      gluetun-data:
        type: emptyDir
        advancedMounts:
          qbittorrent-gluetun:
            gluetun:
              - path: /tmp/gluetun
      tmpfs:
        type: emptyDir
        advancedMounts:
          qbittorrent-gluetun:
            app:
              - path: /tmp
