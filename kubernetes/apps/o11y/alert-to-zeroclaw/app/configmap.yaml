---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alert-to-zeroclaw-script
data:
  adapter.py: |
    """Alertmanager webhook → ZeroClaw /webhook adapter.

    Receives Alertmanager webhook payloads, formats them as natural-language
    investigation prompts, and POSTs to ZeroClaw's /webhook endpoint.
    """

    import hashlib
    import json
    import os
    import sys
    import urllib.request
    from http.server import BaseHTTPRequestHandler, HTTPServer, ThreadingHTTPServer

    ZEROCLAW_URL = os.environ.get(
        "ZEROCLAW_URL", "http://zeroclaw.zeroclaw.svc.cluster.local:42617/webhook"
    )
    ZEROCLAW_TOKEN = os.environ.get("ZEROCLAW_TOKEN", "")
    LISTEN_PORT = int(os.environ.get("LISTEN_PORT", "8080"))


    def format_prompt(payload: dict) -> str:
        alerts = payload.get("alerts", [])
        if not alerts:
            return ""

        parts = []
        parts.append(
            "ALERT INVESTIGATION REQUEST\n"
            "You are receiving this because Alertmanager fired an alert. "
            "Investigate the root cause using kubectl. Check pod status, logs, "
            "events, describe output, PVC health, and node conditions. "
            "Summarize your findings concisely.\n"
        )

        for alert in alerts:
            if alert.get("status") != "firing":
                continue
            labels = alert.get("labels", {})
            annotations = alert.get("annotations", {})

            name = labels.get("alertname", "Unknown")
            severity = labels.get("severity", "unknown")
            namespace = labels.get("namespace", "")
            pod = labels.get("pod", "")
            job = labels.get("job", "")
            node = labels.get("node", "")
            summary = annotations.get("summary", "")
            description = annotations.get("description", "")

            parts.append(f"--- Alert: {name} (severity: {severity}) ---")
            if namespace:
                parts.append(f"Namespace: {namespace}")
            if pod:
                parts.append(f"Pod: {pod}")
            if job:
                parts.append(f"Job: {job}")
            if node:
                parts.append(f"Node: {node}")
            if summary:
                parts.append(f"Summary: {summary}")
            if description:
                parts.append(f"Description: {description}")
            parts.append("")

        if len(parts) <= 2:
            return ""

        parts.append(
            "Instructions:\n"
            "1. Use kubectl to investigate the affected resources\n"
            "2. Check pod logs (last 50 lines), events, and describe output\n"
            "3. If volume-related, check PVC status and volsync replication sources\n"
            "4. If node-related, check node conditions and resource pressure\n"
            "5. Determine root cause and whether it is self-resolving\n"
            "6. Report your findings via the discord channel"
        )
        return "\n".join(parts)


    def idempotency_key(payload: dict) -> str:
        group_key = payload.get("groupKey", "")
        alerts = payload.get("alerts", [])
        starts = ",".join(a.get("startsAt", "") for a in alerts if a.get("status") == "firing")
        raw = f"{group_key}:{starts}"
        return hashlib.sha256(raw.encode()).hexdigest()[:32]


    def forward_to_zeroclaw(message: str, key: str) -> tuple[int, str]:
        body = json.dumps({"message": message}).encode()
        req = urllib.request.Request(
            ZEROCLAW_URL,
            data=body,
            headers={
                "Content-Type": "application/json",
                "Authorization": f"Bearer {ZEROCLAW_TOKEN}",
                "X-Idempotency-Key": key,
            },
            method="POST",
        )
        try:
            with urllib.request.urlopen(req, timeout=30) as resp:
                return resp.status, resp.read().decode(errors="replace")[:500]
        except urllib.error.HTTPError as e:
            return e.code, e.read().decode(errors="replace")[:500]
        except Exception as e:
            return 502, str(e)[:500]


    class Handler(BaseHTTPRequestHandler):
        def do_GET(self):
            if self.path == "/healthz":
                self.send_response(200)
                self.send_header("Content-Type", "text/plain")
                self.end_headers()
                self.wfile.write(b"ok")
                return
            self.send_response(404)
            self.end_headers()

        def do_POST(self):
            if self.path != "/alert":
                self.send_response(404)
                self.end_headers()
                return

            length = int(self.headers.get("Content-Length", 0))
            raw = self.rfile.read(length)

            try:
                payload = json.loads(raw)
            except json.JSONDecodeError as e:
                self.send_response(400)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps({"error": str(e)}).encode())
                return

            prompt = format_prompt(payload)
            if not prompt:
                self.send_response(204)
                self.end_headers()
                return

            key = idempotency_key(payload)
            status, resp_body = forward_to_zeroclaw(prompt, key)

            print(f"[adapter] forwarded alert group → ZeroClaw (status={status}, key={key[:8]}...)")
            sys.stdout.flush()

            try:
                self.send_response(202 if status < 400 else 502)
                self.send_header("Content-Type", "application/json")
                self.end_headers()
                self.wfile.write(json.dumps({"zeroclaw_status": status, "key": key}).encode())
            except BrokenPipeError:
                pass

        def log_message(self, format, *args):
            print(f"[adapter] {args[0]}")
            sys.stdout.flush()


    if __name__ == "__main__":
        if not ZEROCLAW_TOKEN:
            print("[adapter] WARNING: ZEROCLAW_TOKEN not set, requests will fail auth", flush=True)
        print(f"[adapter] listening on :{LISTEN_PORT}, forwarding to {ZEROCLAW_URL}", flush=True)
        server = ThreadingHTTPServer(("0.0.0.0", LISTEN_PORT), Handler)
        server.serve_forever()
