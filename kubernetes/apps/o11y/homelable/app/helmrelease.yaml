---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: homelable
spec:
  chartRef:
    kind: OCIRepository
    name: homelable
  interval: 1h
  values:
    controllers:
      homelable:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          frontend:
            image:
              repository: ghcr.io/pouzor/homelable-frontend
              tag: 1.12.0
            probes:
              liveness: &frontendProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &httpPort 80
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *frontendProbes
            resources:
              requests:
                cpu: 5m
                memory: 32Mi
              limits:
                memory: 128Mi
          backend:
            image:
              repository: ghcr.io/pouzor/homelable-backend
              tag: 1.12.0
            env:
              TZ: America/Chicago
              SQLITE_PATH: /app/data/homelab.db
              CORS_ORIGINS: '["https://homelable.${SECRET_DOMAIN}"]'
              AUTH_USERNAME: admin
              STATUS_CHECKER_INTERVAL: "60"
              SCANNER_RANGES: '["192.168.1.0/24","192.168.5.0/24"]'
              SECRET_KEY:
                valueFrom:
                  secretKeyRef:
                    name: homelable-secret
                    key: SECRET_KEY
              AUTH_PASSWORD_HASH:
                valueFrom:
                  secretKeyRef:
                    name: homelable-secret
                    key: AUTH_PASSWORD_HASH
            probes:
              liveness: &backendProbes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/health
                    port: &apiPort 8000
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness: *backendProbes
            securityContext:
              capabilities:
                add: ["NET_RAW"]
                drop: ["ALL"]
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 512Mi
    service:
      app:
        ports:
          http:
            port: *httpPort
    route:
      app:
        hostnames:
          - "homelable.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *httpPort
    persistence:
      data:
        existingClaim: homelable
        advancedMounts:
          homelable:
            backend:
              - path: /app/data
      nginx-config:
        type: configMap
        name: homelable-nginx
        advancedMounts:
          homelable:
            frontend:
              - path: /etc/nginx/conf.d/default.conf
                subPath: default.conf
                readOnly: true
