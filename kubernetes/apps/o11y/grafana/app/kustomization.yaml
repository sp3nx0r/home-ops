---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./helmrelease.yaml
  - ./ocirepository.yaml
  - ./secret.sops.yaml
  - ./oidc-secret.sops.yaml
  - ./securitypolicy.yaml
configMapGenerator:
  - name: grafana-dashboard-ollama
    files:
      - ./dashboards/ollama.json
    options:
      labels:
        grafana_dashboard: "1"
      annotations:
        grafana_folder: Ollama
generatorOptions:
  disableNameSuffixHash: true
