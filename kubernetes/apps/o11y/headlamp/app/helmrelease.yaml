---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      version: 0.41.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
  interval: 1h
  values:
    config:
      inCluster: true
      inClusterContextName: homelab
    clusterRoleBinding:
      create: true
      clusterRoleName: view
    service:
      type: ClusterIP
      port: 80
    httpRoute:
      enabled: true
      parentRefs:
        - name: envoy-internal
          namespace: network
      hostnames:
        - "headlamp.securimancy.com"
    securityContext:
      runAsNonRoot: true
      runAsUser: 100
      runAsGroup: 101
      allowPrivilegeEscalation: false
      readOnlyRootFilesystem: true
      capabilities:
        drop: ["ALL"]
    resources:
      requests:
        cpu: 10m
        memory: 64Mi
        ephemeral-storage: 50Mi
      limits:
        memory: 256Mi
        ephemeral-storage: 256Mi
