---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: loki
spec:
  chartRef:
    kind: OCIRepository
    name: loki
  interval: 1h
  values:
    deploymentMode: SingleBinary

    loki:
      auth_enabled: false
      schemaConfig:
        configs:
          - from: "2024-04-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: loki_index_
              period: 24h
      ingester:
        chunk_encoding: snappy
      querier:
        max_concurrent: 2
      pattern_ingester:
        enabled: true
      limits_config:
        allow_structured_metadata: true
        volume_enabled: true
        retention_period: 720h
      compactor:
        retention_enabled: true
        delete_request_store: s3
      storage:
        type: s3
        bucketNames:
          chunks: loki-chunks
          ruler: loki-ruler
        s3:
          endpoint: garage.storage.svc.cluster.local:3900
          region: garage
          accessKeyId: "${LOKI_S3_KEY_ID}"
          secretAccessKey: "${LOKI_S3_SECRET_KEY}"
          s3ForcePathStyle: true
          insecure: true
      commonConfig:
        replication_factor: 1

    singleBinary:
      replicas: 1
      persistence:
        storageClass: iscsi
        size: 5Gi
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          memory: 1Gi

    gateway:
      enabled: true

    backend:
      replicas: 0
    read:
      replicas: 0
    write:
      replicas: 0

    minio:
      enabled: false

    lokiCanary:
      enabled: false

    chunksCache:
      enabled: false

    resultsCache:
      enabled: false

    test:
      enabled: false
