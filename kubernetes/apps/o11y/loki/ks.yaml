---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: loki
spec:
  dependsOn:
    - name: garage
      namespace: storage
  interval: 1h
  path: ./kubernetes/apps/o11y/loki/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: o11y
  wait: true
  postBuild:
    substituteFrom:
      - name: loki-secret
        kind: Secret
