---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  values:
    cleanPrometheusOperatorObjectNames: true

    alertmanager:
      route:
        main:
          enabled: true
          hostnames:
            - alertmanager.securimancy.com
          parentRefs:
            - name: envoy-internal
              namespace: network
      config:
        global:
          resolve_timeout: 5m
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity = warning
            equal:
              - alertname
              - namespace
        receivers:
          - name: blackhole
          - name: discord
            discord_configs:
              - webhook_url: ${DISCORD_WEBHOOK_URL}
                send_resolved: true
                title: >-
                  {{ if eq .Status "firing" }}🔥{{ else }}✅{{ end }} [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                message: >-
                  {{- range .Alerts }}

                  {{ if eq .Labels.severity "critical" }}🚨{{ else if eq .Labels.severity "warning" }}⚠️{{ else }}ℹ️{{ end }} **{{ .Labels.alertname }}** {{ if .Labels.severity }}(`{{ .Labels.severity }}`){{ end }}

                  {{ if .Annotations.summary }}> {{ .Annotations.summary }}{{ end }}

                  {{ if .Annotations.description }}> {{ .Annotations.description }}{{ end }}

                  {{ if .Labels.namespace }}**Namespace:** `{{ .Labels.namespace }}`{{ end }}{{ if .Labels.pod }} | **Pod:** `{{ .Labels.pod }}`{{ end }}{{ if .Labels.job }} | **Job:** `{{ .Labels.job }}`{{ end }}

                  {{ if .Labels.node }}**Node:** `{{ .Labels.node }}`{{ end }}{{ if .Labels.service }} | **Service:** `{{ .Labels.service }}`{{ end }}

                  **Since:** {{ .StartsAt.Format "Jan 02 15:04 MST" }}{{ if .Annotations.runbook_url }} | **Runbook:** [link]({{ .Annotations.runbook_url }}){{ end }}

                  ---

                  {{- end }}
        route:
          receiver: discord
          group_by:
            - alertname
            - namespace
          group_wait: 1m
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: blackhole
              matchers:
                - alertname = Watchdog
            - receiver: discord
              matchers:
                - severity = critical
              group_wait: 30s

    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
    kubeProxy:
      enabled: false

    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - prometheus.securimancy.com
          parentRefs:
            - name: envoy-internal
              namespace: network
      prometheusSpec:
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
        retention: 14d
        retentionSize: 10GB
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 2Gi

    prometheus-node-exporter:
      fullnameOverride: node-exporter

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        - pods=[*]
        - nodes=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]

    grafana:
      enabled: false
      forceDeployDashboards: false
