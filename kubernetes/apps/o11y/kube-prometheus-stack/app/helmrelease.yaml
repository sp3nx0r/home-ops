---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chartRef:
    kind: OCIRepository
    name: kube-prometheus-stack
  interval: 1h
  values:
    cleanPrometheusOperatorObjectNames: true

    alertmanager:
      route:
        main:
          enabled: true
          hostnames:
            - alertmanager.securimancy.com
          parentRefs:
            - name: envoy-internal
              namespace: network
      alertmanagerSpec:
        secrets:
          - alertmanager-secret
      config:
        global:
          resolve_timeout: 5m
        inhibit_rules:
          - source_matchers:
              - severity = critical
            target_matchers:
              - severity = warning
            equal:
              - alertname
              - namespace
        receivers:
          - name: blackhole
          - name: discord
            discord_configs:
              - webhook_url_file: /etc/alertmanager/secrets/alertmanager-secret/DISCORD_WEBHOOK_URL
                send_resolved: true
                title: >-
                  [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
                message: >-
                  {{- range .Alerts }}

                  **{{ .Labels.alertname }}** {{ if .Labels.severity }}({{ .Labels.severity }}){{ end }}

                  {{ if .Annotations.summary }}{{ .Annotations.summary }}{{ else if .Annotations.description }}{{ .Annotations.description }}{{ else if .Annotations.message }}{{ .Annotations.message }}{{ end }}

                  {{- end }}
        route:
          receiver: discord
          group_by:
            - alertname
            - namespace
          group_wait: 1m
          group_interval: 5m
          repeat_interval: 12h
          routes:
            - receiver: blackhole
              matchers:
                - alertname = InfoInhibitor
            - receiver: discord
              matchers:
                - alertname = Watchdog
              repeat_interval: 5m
            - receiver: discord
              matchers:
                - severity = critical
              group_wait: 30s

    kubeEtcd:
      service:
        selector:
          component: kube-apiserver
    kubeProxy:
      enabled: false

    prometheus:
      route:
        main:
          enabled: true
          hostnames:
            - prometheus.securimancy.com
          parentRefs:
            - name: envoy-internal
              namespace: network
      prometheusSpec:
        ruleSelectorNilUsesHelmValues: false
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false
        scrapeConfigSelectorNilUsesHelmValues: false
        enableAdminAPI: true
        walCompression: true
        enableFeatures:
          - memory-snapshot-on-shutdown
        retention: 14d
        retentionSize: 10GB
        resources:
          requests:
            cpu: 100m
          limits:
            memory: 2Gi

    prometheus-node-exporter:
      fullnameOverride: node-exporter

    kube-state-metrics:
      fullnameOverride: kube-state-metrics
      metricLabelsAllowlist:
        - pods=[*]
        - nodes=[*]
        - deployments=[*]
        - persistentvolumeclaims=[*]

    grafana:
      enabled: false
      forceDeployDashboards: true
