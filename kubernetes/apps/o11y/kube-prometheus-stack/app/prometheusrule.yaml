---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/monitoring.coreos.com/prometheusrule_v1.json
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: iscsi-storage
spec:
  groups:
    - name: iscsi-storage.rules
      rules:
        - alert: ISCSIVolumeReadOnly
          expr: |-
            node_filesystem_device_error{mountpoint=~"/var/lib/kubelet/plugins/kubernetes.io/csi/org.democratic-csi.*", fstype="ext4"} == 1
          for: 2m
          annotations:
            summary: >-
              iSCSI volume {{ $labels.mountpoint }} on {{ $labels.instance }} has device errors
            description: >-
              The ext4 filesystem on {{ $labels.device }} ({{ $labels.mountpoint }}) has encountered
              device errors, likely due to iSCSI connection loss. Pods using this volume are likely
              in a read-only state. Delete affected pods to trigger remount and e2fsck recovery.
            runbook_url: https://github.com/sp3nx0r/home-ops/blob/main/docs/runbooks/runbook-iscsi-readonly.md
          labels:
            severity: critical
    - name: sardior-ollama.rules
      rules:
        - alert: OllamaBackendDown
          expr: ollama_up == 0
          for: 3m
          annotations:
            summary: >-
              Ollama on {{ $labels.instance }} is not responding
            description: >-
              The Ollama API on sardior has been unreachable for more than 3 minutes.
              LLM inference will be unavailable.
          labels:
            severity: warning
        - alert: OllamaExporterAbsent
          expr: absent(ollama_up{job="sardior-ollama"})
          for: 5m
          annotations:
            summary: >-
              Ollama exporter on {{ $labels.instance }} is not being scraped
            description: >-
              Prometheus has not received any ollama_up metric from sardior in 5 minutes.
              The exporter service may be down or unreachable.
          labels:
            severity: warning
    - name: sardior-stt.rules
      rules:
        - alert: STTBackendDown
          expr: stt_up == 0
          for: 3m
          annotations:
            summary: >-
              STT backend on {{ $labels.instance }} is not responding
            description: >-
              The active STT service (Speaches or whisper.cpp) on sardior has been unreachable
              for more than 3 minutes. Transcription via Whispering will fail.
          labels:
            severity: warning
        - alert: STTExporterAbsent
          expr: absent(stt_up{job="sardior-stt"})
          for: 5m
          annotations:
            summary: >-
              STT exporter on {{ $labels.instance }} is not being scraped
            description: >-
              Prometheus has not received any stt_up metric from sardior in 5 minutes.
              The exporter service may be down or unreachable.
          labels:
            severity: warning
