---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: pocket-id
spec:
  chartRef:
    kind: OCIRepository
    name: pocket-id
  interval: 1h
  values:
    controllers:
      pocket-id:
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/pocket-id/pocket-id
              tag: v2.7.0
            env:
              APP_URL: "https://id.${SECRET_DOMAIN}"
              TRUST_PROXY: "true"
              DB_CONNECTION_STRING: "/app/data/pocket-id.db"
              ANALYTICS_DISABLED: "true"
              VERSION_CHECK_DISABLED: "true"
              METRICS_ENABLED: "true"
              OTEL_METRICS_EXPORTER: "prometheus"
              OTEL_EXPORTER_PROMETHEUS_HOST: "0.0.0.0"
              OTEL_EXPORTER_PROMETHEUS_PORT: "9464"
              FILE_BACKEND: "s3"
              S3_BUCKET: "pocket-id"
              S3_REGION: "garage"
              S3_ENDPOINT: "http://garage.storage.svc.cluster.local:3900"
              S3_ACCESS_KEY_ID: "${POCKET_ID_S3_KEY_ID}"
              S3_SECRET_ACCESS_KEY: "${POCKET_ID_S3_SECRET_KEY}"
              S3_FORCE_PATH_STYLE: "true"
            envFrom:
              - secretRef:
                  name: pocket-id-secret
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /healthz
                    port: &port 1411
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
              readiness: *probes
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        ports:
          http:
            port: *port
          metrics:
            port: 9464
    route:
      app:
        hostnames:
          - "id.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    serviceMonitor:
      app:
        serviceName: pocket-id
        endpoints:
          - port: metrics
            scheme: http
            path: /metrics
            interval: 1m
            scrapeTimeout: 10s
    persistence:
      data:
        existingClaim: pocket-id
        globalMounts:
          - path: /app/data
