---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: zeroclaw
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: zeroclaw
  ingress:
    # Envoy Gateway (web dashboard + API)
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: network
            gateway.envoyproxy.io/owning-gateway-name: envoy-internal
      toPorts:
        - ports:
            - port: "42617"
              protocol: TCP
    # Prometheus metrics scraping
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: o11y
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "42617"
              protocol: TCP
  egress:
    # Ollama LLM inference (external host behind ollama-proxy service)
    - toCIDR:
        - 192.168.5.70/32
      toPorts:
        - ports:
            - port: "11435"
              protocol: TCP
    # SearXNG web search
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: default
            app.kubernetes.io/name: searxng
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # DNS resolution
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
    # Discord Gateway + Signal servers (HTTPS)
    # CDN IPs rotate; port-restricted egress is the practical compromise
    - toEntities:
        - world
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
