---
apiVersion: v1
kind: ConfigMap
metadata:
  name: zeroclaw-config
data:
  config.toml: |
    workspace_dir = "/zeroclaw-data/workspace"
    default_provider = "ollama"
    default_model = "qwen3.5:35b"

    [providers.models.ollama]
    kind = "ollama"
    base_url = "http://ollama-proxy.default.svc.cluster.local:11435"
    model = "qwen3.5:35b"
    timeout_secs = 120
    tool_calling = "native"

    [autonomy]
    level = "supervised"

    [security]
    allowed_domains = [
      "ollama-proxy.default.svc.cluster.local",
      "searxng.default.svc.cluster.local",
    ]
    forbidden_commands = ["rm", "dd", "mkfs", "fdisk", "wget", "curl"]

    [gateway]
    port = 42617
    bind = "[::]"
    allow_public_bind = true
    require_pairing = true

    [channels.signal]
    enabled = true
    signal_cli_url = "http://localhost:8080"

    [channels.discord]
    enabled = true
    mention_only = false
    stream_mode = "partial"

    [tools.web_search]
    provider = "searxng"
    base_url = "http://searxng.default.svc.cluster.local:8080"

    [identity]
    format = "markdown"
