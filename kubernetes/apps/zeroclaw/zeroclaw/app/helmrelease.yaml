---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zeroclaw
spec:
  chartRef:
    kind: OCIRepository
    name: zeroclaw
  interval: 1h
  values:
    controllers:
      zeroclaw:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/zeroclaw-labs/zeroclaw
              tag: v0.7.5
            args: ["daemon"]
            env:
              ZEROCLAW_WORKSPACE: /zeroclaw-data
            envFrom:
              - secretRef:
                  name: zeroclaw-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["zeroclaw", "status"]
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["zeroclaw", "status"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
          signal-cli:
            image:
              repository: docker.io/bbernhard/signal-cli-rest-api
              tag: "0.98"
            env:
              MODE: json-rpc
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: false
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: &port 42617
    route:
      app:
        hostnames:
          - "zeroclaw.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: zeroclaw
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data
                subPath: zeroclaw-data
            signal-cli:
              - path: /home/.local/share/signal-cli
                subPath: signal-data
      config:
        type: configMap
        name: zeroclaw-config
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/.zeroclaw/config.toml
                subPath: config.toml
                readOnly: true
      persona-soul:
        type: secret
        name: zeroclaw-persona
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/workspace/SOUL.md
                subPath: SOUL.md
                readOnly: true
      persona-identity:
        type: secret
        name: zeroclaw-persona
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/workspace/IDENTITY.md
                subPath: IDENTITY.md
                readOnly: true
      persona-user:
        type: secret
        name: zeroclaw-persona
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/workspace/USER.md
                subPath: USER.md
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          zeroclaw:
            app:
              - path: /tmp
            signal-cli:
              - path: /tmp
