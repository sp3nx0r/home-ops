---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: zeroclaw
spec:
  chartRef:
    kind: OCIRepository
    name: zeroclaw
  interval: 1h
  values:
    controllers:
      zeroclaw:
        strategy: Recreate
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          init-web:
            image:
              repository: ghcr.io/zeroclaw-labs/zeroclaw
              tag: v0.7.5-debian
            command: ["cp", "-r", "/zeroclaw-data/web/dist/.", "/web-dist/"]
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
        containers:
          app:
            image:
              repository: ghcr.io/zeroclaw-labs/zeroclaw
              tag: v0.7.5
            args: ["daemon"]
            env:
              ZEROCLAW_WORKSPACE: /zeroclaw-data
              ZEROCLAW_GATEWAY_PORT: "42617"
              ZEROCLAW_GATEWAY_HOST: "0.0.0.0"
              ZEROCLAW_WEB_DIST_DIR: /web-dist
              ZEROCLAW_ALLOW_PUBLIC_BIND: "true"
              OLLAMA_API_KEY: "${SECRET_OLLAMA_API_KEY}"
              WEB_SEARCH_PROVIDER: searxng
              SEARXNG_INSTANCE_URL: "http://searxng.default.svc.cluster.local:8080"
            envFrom:
              - secretRef:
                  name: zeroclaw-secret
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["zeroclaw", "status"]
                  initialDelaySeconds: 15
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  exec:
                    command: ["zeroclaw", "status"]
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 5
                  failureThreshold: 3
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: {drop: ["ALL"]}
              seccompProfile: {type: RuntimeDefault}
          signal-cli:
            image:
              repository: docker.io/bbernhard/signal-cli-rest-api
              tag: "0.99"
            env:
              MODE: json-rpc
              SIGNAL_CLI_CONFIG_DIR: /signal-data
            resources:
              requests:
                cpu: 10m
                memory: 128Mi
              limits:
                memory: 256Mi
            securityContext:
              runAsNonRoot: false
              runAsUser: 0
              readOnlyRootFilesystem: false
              seccompProfile: {type: RuntimeDefault}
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        seccompProfile: {type: RuntimeDefault}
    service:
      app:
        ports:
          http:
            port: &port 42617
    route:
      app:
        hostnames:
          - "zeroclaw.${SECRET_DOMAIN}"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - identifier: app
                port: *port
    persistence:
      data:
        existingClaim: zeroclaw
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data
                subPath: zeroclaw-data
            signal-cli:
              - path: /signal-data
                subPath: signal-data
      config:
        type: configMap
        name: zeroclaw-config
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/config.toml
                subPath: config.toml
                readOnly: true
      persona-soul:
        type: secret
        name: zeroclaw-persona
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/workspace/SOUL.md
                subPath: SOUL.md
                readOnly: true
      persona-identity:
        type: secret
        name: zeroclaw-persona
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/workspace/IDENTITY.md
                subPath: IDENTITY.md
                readOnly: true
      persona-user:
        type: secret
        name: zeroclaw-persona
        advancedMounts:
          zeroclaw:
            app:
              - path: /zeroclaw-data/workspace/USER.md
                subPath: USER.md
                readOnly: true
      web-dist:
        type: emptyDir
        advancedMounts:
          zeroclaw:
            init-web:
              - path: /web-dist
            app:
              - path: /web-dist
                readOnly: true
      tmp:
        type: emptyDir
        advancedMounts:
          zeroclaw:
            app:
              - path: /tmp
            signal-cli:
              - path: /tmp
