---
apiVersion: externaldns.k8s.io/v1alpha1
kind: DNSEndpoint
metadata:
  name: unifi-static-records
spec:
  endpoints:
    - dnsName: cluster.securimancy.com
      recordType: A
      targets:
        - 192.168.5.50
        - 192.168.5.51
        - 192.168.5.52
    - dnsName: nas.securimancy.com
      recordType: A
      targets:
        - 192.168.5.40
    - dnsName: syslog.securimancy.com
      recordType: A
      targets:
        - 192.168.5.24
    - dnsName: tor-relay.securimancy.com
      recordType: A
      targets:
        - 192.168.5.22
