---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: tor-relay
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: tor-relay
  ingress:
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "30932"
              protocol: TCP
            - port: "30913"
              protocol: TCP
  egress:
    - toEntities:
        - world
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
