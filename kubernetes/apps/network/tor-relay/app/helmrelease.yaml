---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tor-relay
spec:
  chartRef:
    kind: OCIRepository
    name: tor-relay
  interval: 1h
  values:
    controllers:
      tor-relay:
        annotations:
          reloader.stakater.com/auto: "true"
        initContainers:
          fix-perms:
            image:
              repository: busybox
              tag: latest
              pullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - chown -R 101:101 /var/lib/tor
            securityContext:
              runAsUser: 0
              runAsNonRoot: false
          resolve-ip:
            image:
              repository: curlimages/curl
              tag: latest
              pullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - |
                IP=$(curl -4 -sf --retry 3 --retry-delay 5 https://ipv4.icanhazip.com)
                echo "$IP" > /shared/external-ip
                echo "Resolved external IP: $IP"
        containers:
          app:
            image:
              repository: thetorproject/obfs4-bridge
              tag: latest
              pullPolicy: Always
            command: ["/bin/sh", "-c"]
            args:
              - |
                export OBFS4V_Address=$(cat /shared/external-ip)
                echo "Using external IP: $OBFS4V_Address"
                exec /usr/local/bin/start-tor.sh
            env:
              OR_PORT: "30932"
              PT_PORT: "30913"
              EMAIL:
                valueFrom:
                  secretKeyRef:
                    name: tor-relay-secret
                    key: EMAIL
              NICKNAME: securimancy
              OBFS4_ENABLE_ADDITIONAL_VARIABLES: "1"
              OBFS4V_AddressDisableIPv6: "1"
              OBFS4V_HardwareAccel: "1"
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 30932
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              startup:
                enabled: true
                custom: true
                spec:
                  tcpSocket:
                    port: 30932
                  failureThreshold: 30
                  periodSeconds: 10
            resources:
              requests:
                cpu: 50m
                memory: 128Mi
              limits:
                memory: 512Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        fsGroupChangePolicy: OnRootMismatch
    service:
      app:
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: "192.168.5.22"
        externalTrafficPolicy: Cluster
        ports:
          or-port:
            port: 30932
            protocol: TCP
          pt-port:
            port: 30913
            protocol: TCP
    persistence:
      data:
        type: nfs
        server: 192.168.5.40
        path: /mnt/tank/homelab/k8s-exports/network-tor-relay-data
        advancedMounts:
          tor-relay:
            fix-perms:
              - path: /var/lib/tor
            app:
              - path: /var/lib/tor
      shared:
        type: emptyDir
        advancedMounts:
          tor-relay:
            resolve-ip:
              - path: /shared
            app:
              - path: /shared
      tor-config:
        type: emptyDir
        advancedMounts:
          tor-relay:
            app:
              - path: /etc/tor
      tor-log:
        type: emptyDir
        advancedMounts:
          tor-relay:
            app:
              - path: /var/log/tor
