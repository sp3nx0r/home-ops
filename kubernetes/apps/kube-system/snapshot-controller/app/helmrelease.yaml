---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: snapshot-controller
spec:
  chart:
    spec:
      chart: snapshot-controller
      version: 5.0.4
      sourceRef:
        kind: HelmRepository
        name: piraeus-charts
  interval: 1h
  values:
    controller:
      serviceMonitor:
        create: true
    webhook:
      enabled: false
