---
version: '3'

vars:
  ANSIBLE_DIR: '{{.ROOT_DIR}}/ansible'
  ANSIBLE_VENV: '{{.ANSIBLE_DIR}}/.venv'

tasks:

  init:
    desc: Create venv and install Ansible + collections
    dir: '{{.ANSIBLE_DIR}}'
    cmds:
      - uv venv --allow-existing {{.ANSIBLE_VENV}}
      - uv pip install --python {{.ANSIBLE_VENV}}/bin/python ansible-core ansible-lint boto3 botocore
      - '{{.ANSIBLE_VENV}}/bin/ansible-galaxy collection install -r requirements.yml --force'
      # Patch arensb.truenas 1.14.4 — remove broken filesystem action plugin
      - rm -f ~/.ansible/collections/ansible_collections/arensb/truenas/plugins/action/filesystem.py
    preconditions:
      - test -f {{.ANSIBLE_DIR}}/requirements.yml
      - which uv

  lint:
    desc: Lint Ansible playbooks and roles
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-lint'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-lint

  all:
    desc: Run all infrastructure configuration playbooks
    cmds:
      - task: nas
      - task: ms-s1
      - task: backblaze

  all:dry-run:
    desc: Dry run all infrastructure configuration playbooks
    cmds:
      - task: nas:dry-run
      - task: ms-s1:dry-run
      - task: backblaze:dry-run

  nas:
    desc: Run TrueNAS NAS (hl8) configuration playbook
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/truenas-configure.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  nas:dry-run:
    desc: Dry run TrueNAS NAS (hl8) configuration playbook
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/truenas-configure.yml --check --diff {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  nas:unlock:
    desc: Unlock encrypted datasets after reboot
    interactive: true
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/truenas-unlock.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  iscsi:restart:
    desc: Restart pods using iSCSI PVCs (after NAS reboot / iSCSI recovery)
    interactive: true
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/iscsi-restart-pods.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook
      - which kubectl

  ms-s1:
    desc: Run MS-S1 (sardior) configuration playbook
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/ms-s1-configure.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  ms-s1:dry-run:
    desc: Dry run MS-S1 (sardior) configuration playbook
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/ms-s1-configure.yml --check --diff {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  backblaze:
    desc: Configure Backblaze B2 buckets (versioning + lifecycle)
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/backblaze-configure.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  backblaze:dry-run:
    desc: Dry run Backblaze B2 bucket configuration
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/backblaze-configure.yml --check --diff {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  backblaze:purge-versions:
    desc: Purge noncurrent B2 object versions under b2_target_bucket/b2_purge_prefix (dry-run by default)
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/backblaze-purge-versions.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook

  backblaze:delete-prefix:
    desc: Delete all B2 object versions and markers under b2_target_bucket/b2_delete_prefix (dry-run by default)
    dir: '{{.ANSIBLE_DIR}}'
    cmd: '{{.ANSIBLE_VENV}}/bin/ansible-playbook playbooks/backblaze-delete-prefix.yml {{.CLI_ARGS}}'
    preconditions:
      - test -f {{.ANSIBLE_VENV}}/bin/ansible-playbook
