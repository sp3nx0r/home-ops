---
# Backblaze B2 Bucket Configuration
#
# Ensures the TrueNAS backup buckets have versioning enabled and lifecycle
# rules configured for noncurrent version retention.
#
# The lifecycle task uses purge_rules to remove any rules not managed here,
# preventing drift from manual console changes.
#
# Usage:
#   task ansible:backblaze
#   task ansible:backblaze:dry-run
#
- name: Configure Backblaze B2 buckets
  hosts: backblaze
  gather_facts: false

  vars:
    b2_common_args: &b2_common
      endpoint_url: "{{ b2_endpoint }}"
      region: "{{ b2_region }}"
      aws_access_key: "{{ b2_access_key_id }}"
      aws_secret_key: "{{ b2_secret_access_key }}"

  tasks:
    - name: Ensure bucket versioning state
      amazon.aws.s3_bucket:
        name: "{{ item.name }}"
        state: present
        versioning: "{{ item.versioning }}"
        <<: *b2_common
      loop: "{{ b2_buckets }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [versioning]

    - name: Remove unmanaged lifecycle rules
      no_log: true
      ansible.builtin.command:
        argv:
          - "{{ ansible_playbook_python }}"
          - "-c"
          - |
            import boto3
            s3 = boto3.client('s3',
              endpoint_url='{{ b2_endpoint }}',
              region_name='{{ b2_region }}',
              aws_access_key_id='{{ b2_access_key_id }}',
              aws_secret_access_key='{{ b2_secret_access_key }}')
            bucket = '{{ item.name }}'
            try:
              rules = s3.get_bucket_lifecycle_configuration(Bucket=bucket)['Rules']
            except s3.exceptions.ClientError:
              rules = []
            managed = {'noncurrent-version-cleanup', 'abort-incomplete-multipart'}
            kept = [r for r in rules if r['ID'] in managed]
            if len(kept) < len(rules):
              if kept:
                s3.put_bucket_lifecycle_configuration(Bucket=bucket,
                  LifecycleConfiguration={'Rules': kept})
              else:
                s3.delete_bucket_lifecycle(Bucket=bucket)
              print('purged')
            else:
              print('clean')
      register: _b2_purge
      changed_when: "'purged' in _b2_purge.stdout"
      loop: "{{ b2_buckets }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [lifecycle]

    - name: Configure noncurrent version lifecycle rule
      community.aws.s3_lifecycle:
        name: "{{ item.name }}"
        rule_id: noncurrent-version-cleanup
        noncurrent_version_expiration_days: "{{ item.noncurrent_version_expiration_days }}"
        prefix: ""
        status: enabled
        state: present
        <<: *b2_common
      loop: "{{ b2_buckets }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [lifecycle]

    - name: Configure multipart upload abort rule
      community.aws.s3_lifecycle:
        name: "{{ item.name }}"
        rule_id: abort-incomplete-multipart
        abort_incomplete_multipart_upload_days: "{{ item.abort_multipart_days }}"
        prefix: ""
        status: enabled
        state: present
        <<: *b2_common
      loop: "{{ b2_buckets }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [lifecycle]
