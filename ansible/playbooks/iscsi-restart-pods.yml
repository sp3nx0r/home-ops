---
# Restart workloads using iSCSI-backed PVCs.
# Used after TrueNAS reboot / iSCSI reconnection to force volume unstage/restage
# and e2fsck recovery (requires checkFilesystem enabled in democratic-csi).
#
# Usage:
#   task ansible:iscsi:restart
#
- name: Restart workloads on iSCSI volumes
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    storage_class: iscsi
    grace_period: 30
    confirm_restart: "{{ lookup('pipe', 'test -t 0 && echo true || echo false') | bool }}"
    volsync_controller_namespace: volsync-system
    volsync_controller_deployment: volsync

  tasks:
    - name: Capture current VolSync controller replica count
      ansible.builtin.command:
        cmd: >-
          kubectl --namespace {{ volsync_controller_namespace }}
          get deployment {{ volsync_controller_deployment }}
          --output=jsonpath={.spec.replicas}
      register: _volsync_replicas
      changed_when: false

    - name: Record original VolSync controller replica count
      ansible.builtin.set_fact:
        _original_volsync_replicas: "{{ (_volsync_replicas.stdout | default('1', true)) | int }}"

    - name: Scale VolSync controller down
      ansible.builtin.command:
        cmd: >-
          kubectl --namespace {{ volsync_controller_namespace }}
          scale deployment/{{ volsync_controller_deployment }} --replicas=0
      changed_when: true
      when: _original_volsync_replicas | int > 0

    - name: Wait for VolSync controller scale down
      ansible.builtin.command:
        cmd: >-
          kubectl --namespace {{ volsync_controller_namespace }}
          rollout status deployment/{{ volsync_controller_deployment }} --timeout=120s
      changed_when: false
      when: _original_volsync_replicas | int > 0

    - name: Discover iSCSI-backed workloads
      ansible.builtin.command:
        cmd: python3 -
        stdin: |
          import json
          import subprocess

          storage_class = "{{ storage_class }}"

          def kubectl(*args):
              return json.loads(subprocess.check_output(["kubectl", *args], text=True))

          pvs = kubectl("get", "pv", "-o", "json")["items"]
          pods = kubectl("get", "pods", "--all-namespaces", "-o", "json")["items"]
          replicasets = kubectl("get", "replicasets", "--all-namespaces", "-o", "json")["items"]
          deployments = kubectl("get", "deployments", "--all-namespaces", "-o", "json")["items"]
          statefulsets = kubectl("get", "statefulsets", "--all-namespaces", "-o", "json")["items"]

          iscsi_pvcs = set()
          for pv in pvs:
              spec = pv.get("spec", {})
              claim = spec.get("claimRef")
              if spec.get("storageClassName") == storage_class and claim:
                  iscsi_pvcs.add((claim["namespace"], claim["name"]))

          replicaset_owner = {}
          for rs in replicasets:
              namespace = rs["metadata"]["namespace"]
              name = rs["metadata"]["name"]
              for owner in rs["metadata"].get("ownerReferences", []):
                  if owner.get("controller") and owner.get("kind") == "Deployment":
                      replicaset_owner[(namespace, name)] = owner["name"]

          replica_count = {}
          for deployment in deployments:
              namespace = deployment["metadata"]["namespace"]
              name = deployment["metadata"]["name"]
              replica_count[(namespace, "deployment", name)] = deployment.get("spec", {}).get("replicas", 1)

          for statefulset in statefulsets:
              namespace = statefulset["metadata"]["namespace"]
              name = statefulset["metadata"]["name"]
              replica_count[(namespace, "statefulset", name)] = statefulset.get("spec", {}).get("replicas", 1)

          workloads = {}
          affected_pods = []
          orphan_jobs = {}
          orphan_pods = []

          for pod in pods:
              phase = pod.get("status", {}).get("phase")
              if phase in {"Succeeded", "Failed"}:
                  continue

              namespace = pod["metadata"]["namespace"]
              name = pod["metadata"]["name"]
              uses_iscsi = False

              for volume in pod.get("spec", {}).get("volumes", []):
                  claim = volume.get("persistentVolumeClaim")
                  if claim and (namespace, claim["claimName"]) in iscsi_pvcs:
                      uses_iscsi = True
                      break

              if not uses_iscsi:
                  continue

              affected_pods.append({"namespace": namespace, "name": name})
              owners = [
                  owner for owner in pod["metadata"].get("ownerReferences", [])
                  if owner.get("controller")
              ]

              if not owners:
                  orphan_pods.append({"namespace": namespace, "name": name})
                  continue

              owner = owners[0]
              key = None

              if owner["kind"] == "Job":
                  orphan_jobs[(namespace, owner["name"])] = {
                      "namespace": namespace,
                      "name": owner["name"],
                  }
                  continue

              if owner["kind"] == "ReplicaSet":
                  deployment = replicaset_owner.get((namespace, owner["name"]))
                  if deployment:
                      key = (namespace, "deployment", deployment)
              elif owner["kind"] == "StatefulSet":
                  key = (namespace, "statefulset", owner["name"])

              if key:
                  workloads[key] = {
                      "namespace": key[0],
                      "kind": key[1],
                      "name": key[2],
                      "replicas": replica_count.get(key, 1),
                  }
              else:
                  orphan_pods.append({"namespace": namespace, "name": name})

          print(json.dumps({
              "pvc_count": len(iscsi_pvcs),
              "workloads": sorted(workloads.values(), key=lambda item: (item["namespace"], item["kind"], item["name"])),
              "affected_pods": sorted(affected_pods, key=lambda item: (item["namespace"], item["name"])),
              "orphan_jobs": sorted(orphan_jobs.values(), key=lambda item: (item["namespace"], item["name"])),
              "orphan_pods": sorted(orphan_pods, key=lambda item: (item["namespace"], item["name"])),
          }))
      register: _discovery
      changed_when: false

    - name: Store discovery result
      ansible.builtin.set_fact:
        _iscsi_restart: "{{ _discovery.stdout | from_json }}"

    - name: Display iSCSI PVC count
      ansible.builtin.debug:
        msg: "Found {{ _iscsi_restart.pvc_count }} iSCSI-backed PVCs"

    - name: End play if no iSCSI PVCs found
      ansible.builtin.meta: end_play
      when: _iscsi_restart.pvc_count | int == 0

    - name: End play if no affected workloads found
      ansible.builtin.meta: end_play
      when:
        - _iscsi_restart.workloads | length == 0
        - _iscsi_restart.orphan_jobs | length == 0
        - _iscsi_restart.orphan_pods | length == 0

    - name: Display affected workloads
      ansible.builtin.debug:
        msg: "Will restart {{ item.kind }}/{{ item.name }} in {{ item.namespace }}; original replicas={{ item.replicas }}"
      loop: "{{ _iscsi_restart.workloads }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.kind }}/{{ item.name }}"

    - name: Display orphan jobs
      ansible.builtin.debug:
        msg: "Will delete orphan job {{ item.namespace }}/{{ item.name }}"
      loop: "{{ _iscsi_restart.orphan_jobs }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"

    - name: Display orphan pods
      ansible.builtin.debug:
        msg: "Will delete orphan pod {{ item.namespace }}/{{ item.name }}"
      loop: "{{ _iscsi_restart.orphan_pods }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"

    - name: Confirm restart
      ansible.builtin.pause:
        prompt: >-
          About to scale down {{ _iscsi_restart.workloads | length }} workloads
          and delete {{ _iscsi_restart.orphan_jobs | length }} orphan jobs
          plus {{ _iscsi_restart.orphan_pods | length }} orphan pods.
          Press Enter to continue or Ctrl+C to abort
      when: confirm_restart | bool

    - name: Scale down affected workloads
      ansible.builtin.command:
        cmd: >-
          kubectl scale {{ item.kind }}/{{ item.name }}
          -n {{ item.namespace }}
          --replicas=0
      loop: "{{ _iscsi_restart.workloads }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.kind }}/{{ item.name }}"
      changed_when: true

    - name: Delete orphan jobs
      ansible.builtin.command:
        cmd: >-
          kubectl delete job -n {{ item.namespace }} {{ item.name }}
          --wait=false
          --ignore-not-found=true
      loop: "{{ _iscsi_restart.orphan_jobs }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      changed_when: true
      failed_when: false

    - name: Delete orphan pods
      ansible.builtin.command:
        cmd: >-
          kubectl delete pod -n {{ item.namespace }} {{ item.name }}
          --grace-period=0
          --force
          --wait=false
          --ignore-not-found=true
      loop: "{{ _iscsi_restart.orphan_pods }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      changed_when: true
      failed_when: false

    - name: Wait for affected pods to terminate
      ansible.builtin.command:
        cmd: >-
          kubectl wait pod/{{ item.name }}
          -n {{ item.namespace }}
          --for=delete
          --timeout=180s
      loop: "{{ _iscsi_restart.affected_pods }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.name }}"
      changed_when: false
      failed_when: false
      register: _pod_delete_wait

    - name: Scale up affected workloads
      ansible.builtin.command:
        cmd: >-
          kubectl scale {{ item.kind }}/{{ item.name }}
          -n {{ item.namespace }}
          --replicas={{ item.replicas }}
      loop: "{{ _iscsi_restart.workloads }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.kind }}/{{ item.name }}"
      changed_when: true

    - name: Wait for affected workloads to roll out
      ansible.builtin.command:
        cmd: >-
          kubectl rollout status {{ item.kind }}/{{ item.name }}
          -n {{ item.namespace }}
          --timeout=180s
      loop: "{{ _iscsi_restart.workloads }}"
      loop_control:
        label: "{{ item.namespace }}/{{ item.kind }}/{{ item.name }}"
      changed_when: false
      failed_when: false
      register: _rollout_wait

    - name: Report pods that failed to terminate
      ansible.builtin.debug:
        msg: "WARNING: {{ item.item.namespace }}/{{ item.item.name }} - {{ item.stderr | default('timeout or error') }}"
      loop: "{{ _pod_delete_wait.results }}"
      loop_control:
        label: "{{ item.item.namespace }}/{{ item.item.name }}"
      when: item.rc | default(1) != 0

    - name: Report workloads that failed to roll out
      ansible.builtin.debug:
        msg: "WARNING: {{ item.item.namespace }}/{{ item.item.kind }}/{{ item.item.name }} - {{ item.stderr | default('timeout or error') }}"
      loop: "{{ _rollout_wait.results }}"
      loop_control:
        label: "{{ item.item.namespace }}/{{ item.item.kind }}/{{ item.item.name }}"
      when: item.rc | default(1) != 0

    - name: Restore VolSync controller replica count
      ansible.builtin.command:
        cmd: >-
          kubectl --namespace {{ volsync_controller_namespace }}
          scale deployment/{{ volsync_controller_deployment }} --replicas={{ _original_volsync_replicas }}
      changed_when: true
      when: _original_volsync_replicas | int > 0

    - name: Wait for VolSync controller rollout
      ansible.builtin.command:
        cmd: >-
          kubectl --namespace {{ volsync_controller_namespace }}
          rollout status deployment/{{ volsync_controller_deployment }} --timeout=120s
      changed_when: false
      when: _original_volsync_replicas | int > 0

    - name: Summary
      vars:
        _ready: "{{ _rollout_wait.results | selectattr('rc', 'defined') | selectattr('rc', 'eq', 0) | list | length }}"
      ansible.builtin.debug:
        msg: >-
          Restart complete. {{ _ready }}/{{ _iscsi_restart.workloads | length }} workloads rolled out,
          and VolSync restored to {{ _original_volsync_replicas }} replicas.
          Run 'kubectl get pods -A | grep -v Running' to check remaining issues.
