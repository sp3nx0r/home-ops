---
# TrueNAS HL8 NAS Configuration (TrueNAS SCALE 25.10)
#
# Prerequisites (manual, one-time):
#   1. Install TrueNAS SCALE on the HL8
#   2. Create pool "tank" in the TrueNAS UI (Phase 1: RAIDZ1, Phase 2: 2×RAIDZ2)
#   3. Enable SSH service in the TrueNAS UI (System → Services → SSH)
#   4. Create truenas_admin user with SSH key + passwordless sudo (ALL)
#   5. Plug CyberPower UPS USB cable into the HL8
#   6. Create Prometheus API key (after first run adds user to readonly group):
#      midclt call api_key.create '{"name":"prometheus-exporter","username":"prometheus"}'
#   7. Enable 2FA for web UI (Credentials → Users → truenas_admin → 2FA, then
#      Credentials → 2FA → Enable globally)
#
# Usage:
#   task ansible:init       # one-time setup
#   task ansible:configure  # full run
#   task ansible:lint       # lint check
#   task ansible:unlock     # unlock encrypted datasets after reboot
#
- name: Configure TrueNAS HL8 NAS
  hosts: hl8
  become: true
  environment:
    middleware_method: "{{ truenas_middleware_method }}"

  tasks:
    # ----- System -----------------------------------------------------------

    - name: Set hostname
      arensb.truenas.hostname:
        name: "{{ truenas_hostname }}"
      tags: [system]

    - name: Get current network config
      ansible.builtin.command:
        cmd: midclt call network.configuration.config
      register: _network_config
      changed_when: false
      check_mode: false
      tags: [system]

    - name: Set domain # noqa: literal-compare
      ansible.builtin.command:
        cmd: "midclt call network.configuration.update '{\"domain\": \"{{ truenas_domain }}\"}'"
      when: (_network_config.stdout | from_json).domain != truenas_domain
      changed_when: true
      tags: [system]

    - name: Get current system general config
      ansible.builtin.command:
        cmd: midclt call system.general.config
      register: _system_general
      changed_when: false
      check_mode: false
      tags: [system]

    - name: Set timezone # noqa: literal-compare
      ansible.builtin.command:
        cmd: "midclt call system.general.update '{\"timezone\": \"{{ truenas_timezone }}\"}'"
      when: (_system_general.stdout | from_json).timezone != truenas_timezone
      changed_when: true
      tags: [system]

    - name: Enable console messages
      ansible.builtin.command:
        cmd: "midclt call system.general.update '{\"ui_consolemsg\": true}'"
      when: not (_system_general.stdout | from_json).ui_consolemsg | default(false)
      changed_when: true
      tags: [system]

    - name: Disable usage collection
      ansible.builtin.command:
        cmd: "midclt call system.general.update '{\"usage_collection\": false}'"
      when: (_system_general.stdout | from_json).usage_collection | default(true)
      changed_when: true
      tags: [system]

    - name: Enable HTTP to HTTPS redirect
      ansible.builtin.command:
        cmd: "midclt call system.general.update '{\"ui_httpsredirect\": true}'"
      when: not (_system_general.stdout | from_json).ui_httpsredirect | default(false)
      changed_when: true
      notify: restart web ui
      tags: [system]

    - name: Restrict TLS to 1.3 only
      ansible.builtin.command:
        cmd: "midclt call system.general.update '{\"ui_httpsprotocols\": [\"TLSv1.3\"]}'"
      when: (_system_general.stdout | from_json).ui_httpsprotocols != ["TLSv1.3"]
      changed_when: true
      notify: restart web ui
      tags: [system]

    - name: Get current system advanced config
      ansible.builtin.command:
        cmd: midclt call system.advanced.config
      register: _system_advanced
      changed_when: false
      check_mode: false
      tags: [system]

    - name: Require password on text console
      ansible.builtin.command:
        cmd: "midclt call system.advanced.update '{\"consolemenu\": false}'"
      when: (_system_advanced.stdout | from_json).consolemenu | default(true)
      changed_when: true
      tags: [system]

    # ----- Syslog (TrueNAS 25.10+) --------------------------------------------

    - name: Get current syslog config
      ansible.builtin.command:
        cmd: midclt call system.advanced.config
      register: _syslog_config
      changed_when: false
      check_mode: false
      tags: [syslog]

    - name: Configure remote syslog
      ansible.builtin.command:
        cmd: >-
          midclt call system.advanced.update '{{ _payload | to_json }}'
      vars:
        _current_servers: "{{ (_syslog_config.stdout | from_json).syslogservers | default([]) }}"
        _desired_servers:
          - host: "{{ truenas_syslog_remote }}"
            transport: "{{ truenas_syslog_transport }}"
        _payload:
          sysloglevel: "{{ truenas_syslog_level }}"
          syslogservers: "{{ _desired_servers }}"
      when: >-
        _current_servers | length == 0 or
        _current_servers[0].host | default('') != truenas_syslog_remote or
        _current_servers[0].transport | default('') != truenas_syslog_transport
      changed_when: true
      tags: [syslog]

    # ----- NTP ---------------------------------------------------------------

    - name: Query existing NTP servers
      ansible.builtin.command:
        cmd: midclt call system.ntpserver.query
      register: _ntp_servers
      changed_when: false
      check_mode: false
      tags: [ntp]

    - name: Remove existing NTP servers
      ansible.builtin.command:
        cmd: "midclt call system.ntpserver.delete {{ item.id }}"
      loop: "{{ _ntp_servers.stdout | from_json }}"
      loop_control:
        label: "{{ item.address }}"
      when: item.address not in (truenas_ntp_servers | map(attribute='address') | list)
      changed_when: true
      tags: [ntp]

    - name: Add NTP servers
      ansible.builtin.command:
        cmd: >-
          midclt call system.ntpserver.create
          '{"address": "{{ item.address }}", "prefer": {{ item.prefer | default(false) | lower }}, "iburst": true, "force": true}'
      loop: "{{ truenas_ntp_servers }}"
      loop_control:
        label: "{{ item.address }}"
      when: item.address not in (_ntp_servers.stdout | from_json | map(attribute='address') | list)
      changed_when: true
      tags: [ntp]

    # ----- Sysctl Tunables ---------------------------------------------------

    - name: Query existing tunables
      ansible.builtin.command:
        cmd: midclt call tunable.query
      register: _tunables
      changed_when: false
      check_mode: false
      tags: [sysctl]

    - name: Create sysctl tunables
      ansible.builtin.command:
        cmd: >-
          midclt call tunable.create
          '{"var": "{{ item.var }}", "value": "{{ item.value }}", "type": "SYSCTL", "comment": "{{ item.comment | default('') }}", "enabled": true}'
      loop: "{{ truenas_sysctls }}"
      loop_control:
        label: "{{ item.var }}"
      when: item.var not in (_tunables.stdout | from_json | map(attribute='var') | list)
      changed_when: true
      tags: [sysctl]

    - name: Update changed sysctl tunables
      ansible.builtin.command:
        cmd: >-
          midclt call tunable.update {{ _existing.id }}
          '{"value": "{{ item.value }}", "comment": "{{ item.comment | default('') }}", "enabled": true}'
      vars:
        _existing: "{{ (_tunables.stdout | from_json | selectattr('var', 'equalto', item.var) | first) }}"
      loop: "{{ truenas_sysctls }}"
      loop_control:
        label: "{{ item.var }}"
      when:
        - item.var in (_tunables.stdout | from_json | map(attribute='var') | list)
        - _existing.value != item.value
      changed_when: true
      tags: [sysctl]

    # ----- Users ------------------------------------------------------------
    # The arensb.truenas.user module sends password='' on update, which
    # TrueNAS 25.x rejects. Use midclt directly instead.

    - name: Query existing users
      ansible.builtin.command:
        cmd: midclt call user.query
      register: _users
      changed_when: false
      check_mode: false
      tags: [users]

    - name: Create users
      ansible.builtin.command:
        cmd: >-
          midclt call user.create '{{ _payload | to_json }}'
      vars:
        _payload: >-
          {{
            {
              "username": item.name,
              "full_name": item.comment | default(""),
              "email": item.email | default(None),
              "password": item.password | default(omit),
              "password_disabled": item.password_disabled | default(false),
              "shell": item.shell | default("/usr/sbin/nologin"),
              "home": item.home | default("/var/empty"),
              "smb": item.smb | default(false),
              "group_create": item.create_group | default(false),
              "sudo_commands_nopasswd": item.sudo_commands_nopasswd | default([]),
              "sshpubkey": item.ssh_authorized_keys | default([]) | join("\n"),
            }
          }}
      loop: "{{ truenas_users }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name not in (_users.stdout | from_json | map(attribute='username') | list)
      changed_when: true
      tags: [users]

    - name: Update existing users
      ansible.builtin.command:
        cmd: >-
          midclt call user.update {{ _uid }} '{{ _payload | to_json }}'
      vars:
        _existing: "{{ (_users.stdout | from_json | selectattr('username', 'equalto', item.name) | first) }}"
        _uid: "{{ _existing.id }}"
        _payload: >-
          {{
            {
              "full_name": item.comment | default(""),
              "email": item.email | default(None),
              "password_disabled": item.password_disabled | default(false),
              "shell": item.shell | default("/usr/sbin/nologin"),
              "smb": item.smb | default(false),
              "sudo_commands_nopasswd": item.sudo_commands_nopasswd | default([]),
              "sshpubkey": item.ssh_authorized_keys | default([]) | join("\n"),
            }
          }}
      loop: "{{ truenas_users }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name in (_users.stdout | from_json | map(attribute='username') | list)
      changed_when: true
      tags: [users]

    - name: Resolve auxiliary group IDs for users
      ansible.builtin.command:
        cmd: "midclt call group.query '[[\"group\", \"=\", \"{{ item.1 }}\"]]'"
      register: _aux_groups
      loop: "{{ truenas_users | subelements('groups', skip_missing=True) }}"
      loop_control:
        label: "{{ item.0.name }} → {{ item.1 }}"
      changed_when: false
      check_mode: false
      tags: [users]

    - name: Add users to auxiliary groups
      ansible.builtin.command:
        cmd: >-
          midclt call user.update {{ _uid }}
          '{"groups": {{ _group_ids | to_json }}}'
      vars:
        _existing: "{{ (_users.stdout | from_json | selectattr('username', 'equalto', item.name) | first) }}"
        _uid: "{{ _existing.id }}"
        _matched: "{{ _aux_groups.results | selectattr('item.0.name', 'equalto', item.name) }}"
        _wanted_groups: "{{ _matched | map(attribute='stdout') | map('from_json') | map('first') | map(attribute='id') | list }}"
        _current_groups: "{{ _existing.groups | default([]) }}"
        _group_ids: "{{ (_current_groups + _wanted_groups) | unique }}"
      loop: "{{ truenas_users | selectattr('groups', 'defined') | list }}"
      loop_control:
        label: "{{ item.name }}"
      when: _wanted_groups | difference(_current_groups) | length > 0
      changed_when: true
      tags: [users]

    # ----- Services ---------------------------------------------------------

    - name: Enable and start NFS service
      arensb.truenas.service:
        name: nfs
        enabled: true
        state: started
      tags: [services]

    - name: Enable and start SSH service
      arensb.truenas.service:
        name: ssh
        enabled: true
        state: started
      tags: [services]

    - name: Enable and start iSCSI service
      arensb.truenas.service:
        name: iscsitarget
        enabled: true
        state: started
      tags: [services, iscsi]

    # ----- iSCSI Configuration ------------------------------------------------

    - name: Query existing iSCSI portals
      ansible.builtin.command:
        cmd: midclt call iscsi.portal.query
      register: _iscsi_portals
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Create iSCSI portal
      ansible.builtin.command:
        cmd: >-
          midclt call iscsi.portal.create
          '{"listen": [{"ip": "{{ truenas_iscsi_portal_listen }}"}]}'
      register: _iscsi_portal_create
      when: (_iscsi_portals.stdout | from_json | length) == 0
      changed_when: true
      tags: [iscsi]

    - name: Resolve iSCSI portal ID
      ansible.builtin.set_fact:
        _iscsi_portal_id: >-
          {{ (_iscsi_portal_create.stdout | from_json).id
             if _iscsi_portal_create is changed
             else (_iscsi_portals.stdout | from_json | first).id }}
      tags: [iscsi]

    - name: Query existing iSCSI initiator groups
      ansible.builtin.command:
        cmd: midclt call iscsi.initiator.query
      register: _iscsi_initiators
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Create iSCSI initiator group (allow all)
      ansible.builtin.command:
        cmd: >-
          midclt call iscsi.initiator.create
          '{"comment": "k8s-cluster", "initiators": []}'
      register: _iscsi_initiator_create
      when: (_iscsi_initiators.stdout | from_json | length) == 0
      changed_when: true
      tags: [iscsi]

    - name: Resolve iSCSI initiator group ID
      ansible.builtin.set_fact:
        _iscsi_initiator_id: >-
          {{ (_iscsi_initiator_create.stdout | from_json).id
             if _iscsi_initiator_create is changed
             else (_iscsi_initiators.stdout | from_json | first).id }}
      tags: [iscsi]

    # ----- CSI Service Account ------------------------------------------------
    # NOTE: TrueNAS SCALE 25.10.x only authorizes API keys for users in the
    # builtin_administrators group. Custom privileges DO NOT gate API access.

    - name: Query existing groups
      ansible.builtin.command:
        cmd: "midclt call group.query '[[\"group\", \"=\", \"{{ truenas_csi_group }}\"]]'"
      register: _csi_group_query
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Create CSI group
      ansible.builtin.command:
        cmd: >-
          midclt call group.create
          '{"name": "{{ truenas_csi_group }}", "smb": false}'
      register: _csi_group_create
      when: (_csi_group_query.stdout | from_json | length) == 0
      changed_when: true
      tags: [iscsi]

    - name: Re-query CSI group to get GID
      ansible.builtin.command:
        cmd: "midclt call group.query '[[\"group\", \"=\", \"{{ truenas_csi_group }}\"]]'"
      register: _csi_group_final
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Resolve CSI group GID
      ansible.builtin.set_fact:
        _csi_group_gid: "{{ (_csi_group_final.stdout | from_json | first).gid | int }}"
      tags: [iscsi]

    - name: Check if CSI user exists
      ansible.builtin.command:
        cmd: "midclt call user.query '[[\"username\", \"=\", \"{{ truenas_csi_user }}\"]]'"
      register: _csi_user_query
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Create CSI user
      ansible.builtin.command:
        cmd: >-
          midclt call user.create
          '{"username": "{{ truenas_csi_user }}",
            "full_name": "democratic-csi service account",
            "group": {{ _csi_group_gid }},
            "password_disabled": true,
            "shell": "/usr/sbin/nologin",
            "home": "/var/empty",
            "smb": false}'
      when: (_csi_user_query.stdout | from_json | length) == 0
      changed_when: true
      tags: [iscsi]

    - name: Resolve builtin_administrators group ID
      ansible.builtin.command:
        cmd: "midclt call group.query '[[\"group\", \"=\", \"builtin_administrators\"]]'"
      register: _admin_group_query
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Add CSI user to builtin_administrators (required for API key auth)
      ansible.builtin.command:
        cmd: >-
          midclt call user.update {{ (_csi_user_query.stdout | from_json | first).id }}
          '{"groups": [{{ (_admin_group_query.stdout | from_json | first).id }}]}'
      when: (_csi_user_query.stdout | from_json | length) > 0
      changed_when: false
      tags: [iscsi]

    - name: Query existing API keys for CSI user
      ansible.builtin.command:
        cmd: "midclt call api_key.query '[[\"name\", \"=\", \"democratic-csi\"]]'"
      register: _csi_apikey_query
      changed_when: false
      check_mode: false
      tags: [iscsi]

    - name: Create API key for CSI user
      ansible.builtin.command:
        cmd: >-
          midclt call api_key.create
          '{"name": "democratic-csi", "username": "{{ truenas_csi_user }}"}'
      register: _csi_apikey_create
      when: (_csi_apikey_query.stdout | from_json | length) == 0
      changed_when: true
      tags: [iscsi]

    - name: Display CSI API key (save this!)
      ansible.builtin.debug:
        msg: "CSI API Key: {{ (_csi_apikey_create.stdout | from_json).key }}"
      when: _csi_apikey_create is changed
      tags: [iscsi]

    # ----- Datasets ---------------------------------------------------------

    - name: Create common datasets
      arensb.truenas.filesystem:
        name: "{{ item.name }}"
        state: present
        create_ancestors: true
      loop: "{{ truenas_datasets_common }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [datasets]

    - name: Create Phase 2 datasets
      arensb.truenas.filesystem:
        name: "{{ item.name }}"
        state: present
        create_ancestors: true
      loop: "{{ truenas_datasets_phase2 }}"
      loop_control:
        label: "{{ item.name }}"
      when: truenas_phase == "phase2"
      tags: [datasets]

    # The filesystem module doesn't support all ZFS properties.
    # Set compression, recordsize, atime, sync via zfs set commands.
    - name: Set ZFS root dataset properties
      ansible.builtin.command:
        cmd: "zfs set xattr=sa acltype=posixacl {{ truenas_pool }}"
      changed_when: false
      tags: [datasets]

    - name: Set dataset ownership
      ansible.builtin.file:
        path: "/mnt/{{ item.name }}"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: "0755"
      loop: "{{ truenas_datasets_common }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [datasets]

    - name: Set ZFS dataset properties (common)
      ansible.builtin.command:
        cmd: >-
          zfs set
          compression={{ item.compression }}
          {% if item.recordsize is defined %}recordsize={{ item.recordsize }}{% endif %}
          atime={{ item.atime }}
          {% if item.sync is defined %}sync={{ item.sync }}{% endif %}
          {{ item.name }}
      loop: "{{ truenas_datasets_common }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      tags: [datasets]

    - name: Set ZFS dataset properties (Phase 2)
      ansible.builtin.command:
        cmd: >-
          zfs set
          compression={{ item.compression }}
          {% if item.recordsize is defined %}recordsize={{ item.recordsize }}{% endif %}
          atime={{ item.atime }}
          {% if item.sync is defined %}sync={{ item.sync }}{% endif %}
          {{ item.name }}
      loop: "{{ truenas_datasets_phase2 }}"
      loop_control:
        label: "{{ item.name }}"
      changed_when: false
      when: truenas_phase == "phase2"
      tags: [datasets]

    # ----- Dataset Encryption ------------------------------------------------
    # Top-level datasets get their own passphrase (not inherited from pool).
    # Child datasets inherit from their parent automatically.

    - name: Identify top-level datasets
      ansible.builtin.set_fact:
        _toplevel_datasets: >-
          {{ truenas_datasets_common | map(attribute='name')
             | select('match', '^[^/]+/[^/]+$') | list }}
      tags: [datasets]

    - name: Query dataset encryption status
      ansible.builtin.command:
        cmd: >-
          midclt call pool.dataset.query
          '[["name", "=", "{{ item }}"]]'
          '{"select": ["name", "key_format"]}'
      register: _ds_encryption
      loop: "{{ _toplevel_datasets }}"
      loop_control:
        label: "{{ item }}"
      changed_when: false
      check_mode: false
      tags: [datasets]

    - name: Check if any datasets need passphrase encryption
      ansible.builtin.set_fact:
        _needs_passphrase: >-
          {{ _ds_encryption.results
             | map(attribute='stdout') | map('from_json') | map('first')
             | selectattr('key_format.value', 'ne', 'PASSPHRASE')
             | list | length > 0 }}
      tags: [datasets]

    - name: Prompt for dataset encryption passphrase
      ansible.builtin.pause:
        prompt: "Enter encryption passphrase for datasets (empty to skip)"
        echo: false
      register: _passphrase_prompt
      when: _needs_passphrase | bool
      tags: [datasets]

    - name: Set dataset encryption to passphrase
      ansible.builtin.command:
        cmd: >-
          midclt call pool.dataset.change_key {{ item.item }}
          '{"passphrase": "{{ _passphrase_prompt.user_input }}"}'
      loop: "{{ _ds_encryption.results }}"
      loop_control:
        label: "{{ item.item }}"
      when:
        - _needs_passphrase | bool
        - _passphrase_prompt.user_input | default('') | length > 0
        - (item.stdout | from_json)[0].key_format.value != 'PASSPHRASE'
      changed_when: true
      tags: [datasets]

    # ----- NFS Shares -------------------------------------------------------

    - name: Configure NFS exports
      arensb.truenas.sharing_nfs:
        name: "{{ item.name }}"
        path: "{{ item.path }}"
        networks: "{{ item.networks }}"
        maproot_user: "{{ item.maproot_user }}"
        maproot_group: "{{ item.maproot_group }}"
        state: present
      loop: "{{ truenas_nfs_shares }}"
      loop_control:
        label: "{{ item.name }}"
      tags: [nfs]

    # ----- Snapshot Tasks ---------------------------------------------------

    - name: Configure periodic snapshot tasks
      arensb.truenas.pool_snapshot_task:
        match:
          dataset: "{{ item.dataset }}"
          name_format: "^{{ item.name_format.split('%')[0] }}"
        dataset: "{{ item.dataset }}"
        name_format: "{{ item.name_format }}"
        recursive: "{{ item.recursive | default(false) }}"
        lifetime_value: "{{ item.lifetime_value }}"
        lifetime_unit: "{{ item.lifetime_unit }}"
        minute: "{{ item.minute | default('0') }}"
        hour: "{{ item.hour | default('*') }}"
        day: "{{ item.day | default('*') }}"
        month: "{{ item.month | default('*') }}"
        state: present
      loop: "{{ truenas_snapshot_tasks }}"
      loop_control:
        label: "{{ item.dataset }} ({{ item.name_format }})"
      tags: [snapshots]

    # ----- SMART Tests ------------------------------------------------------
    # TrueNAS 25.10 removed the smart.test API; SMART tests are now cron jobs.

    - name: Query existing cron jobs
      ansible.builtin.command:
        cmd: midclt call cronjob.query
      register: _cronjobs
      changed_when: false
      check_mode: false
      tags: [smart]

    - name: Create SMART test cron jobs
      ansible.builtin.command:
        cmd: >-
          midclt call cronjob.create '{
            "user": "root",
            "command": "midclt call disk.smart_test {{ item.test | upper }} [\"*\"]",
            "description": "{{ item.name }}",
            "enabled": true,
            "schedule": {
              "minute": "0",
              "hour": "{{ item.hour | default('0') }}",
              "dom": "{{ item.day | default('*') }}",
              "month": "{{ item.month | default('*') }}",
              "dow": "{{ item.weekday | default('*') }}"
            }
          }'
      loop: "{{ truenas_smart_tests }}"
      loop_control:
        label: "{{ item.name }}"
      when: item.name not in (_cronjobs.stdout | from_json | map(attribute='description') | list)
      changed_when: true
      tags: [smart]

    # ----- Scrub Task -------------------------------------------------------

    - name: Configure pool scrub task
      arensb.truenas.pool_scrub_task:
        pool: "{{ truenas_pool }}"
        threshold: "{{ truenas_scrub_threshold }}"
        enabled: true
        state: present
      tags: [scrub]

    # ----- ACME TLS Certificate -----------------------------------------------

    - name: Query existing ACME DNS authenticators
      ansible.builtin.command:
        cmd: midclt call acme.dns.authenticator.query
      register: _acme_auths
      changed_when: false
      check_mode: false
      tags: [cert]

    - name: Create Cloudflare ACME DNS authenticator
      ansible.builtin.command:
        cmd: >-
          midclt call acme.dns.authenticator.create
          '{"name": "{{ truenas_cert_acme_authenticator_name }}",
            "attributes": {
              "authenticator": "{{ truenas_cert_acme_authenticator_schema }}",
              "api_token": "{{ truenas_cert_cf_api_token }}"}}'
      register: _acme_auth_create
      when: truenas_cert_acme_authenticator_name not in (_acme_auths.stdout | from_json | map(attribute='name') | list)
      changed_when: true
      tags: [cert]

    - name: Resolve ACME DNS authenticator ID
      ansible.builtin.set_fact:
        _acme_auth_id: >-
          {{ (_acme_auth_create.stdout | default('') | from_json).id
             if _acme_auth_create is changed
             else (_acme_auths.stdout | from_json
                   | selectattr('name', 'equalto', truenas_cert_acme_authenticator_name)
                   | first).id }}
      tags: [cert]

    - name: Query existing certificates
      ansible.builtin.command:
        cmd: midclt call certificate.query
      register: _certs_initial
      changed_when: false
      check_mode: false
      tags: [cert]

    - name: Create CSR for ACME certificate
      ansible.builtin.command:
        cmd: >-
          midclt call certificate.create
          '{"name": "{{ truenas_cert_name }}-csr",
            "create_type": "CERTIFICATE_CREATE_CSR",
            "key_type": "EC",
            "ec_curve": "SECP384R1",
            "common": "{{ truenas_cert_common_name }}",
            "san": {{ truenas_cert_san | to_json }}}'
      register: _csr_create
      when: >-
        (truenas_cert_name + "-csr") not in
        (_certs_initial.stdout | from_json | map(attribute='name') | list)
      changed_when: true
      tags: [cert]

    - name: Wait for CSR job to complete
      ansible.builtin.command:
        cmd: >-
          midclt call core.get_jobs '[["id", "=", {{ _csr_create.stdout | from_json }}]]'
      register: _csr_job
      until: (_csr_job.stdout | from_json | first).state not in ['RUNNING', 'WAITING']
      retries: 30
      delay: 2
      when: _csr_create is changed
      changed_when: false
      tags: [cert]

    - name: Refresh certificate list
      ansible.builtin.command:
        cmd: midclt call certificate.query
      register: _certs
      changed_when: false
      check_mode: false
      tags: [cert]

    - name: Resolve CSR ID
      ansible.builtin.set_fact:
        _csr_id: >-
          {{ (_certs.stdout | from_json
              | selectattr('name', 'equalto', truenas_cert_name + '-csr')
              | first).id }}
      tags: [cert]

    - name: Build DNS mapping for ACME certificate
      ansible.builtin.set_fact:
        _dns_mapping: >-
          {{ dict(truenas_cert_san | zip_longest([], fillvalue=_acme_auth_id | int)) }}
      tags: [cert]

    - name: Create ACME certificate
      ansible.builtin.command:
        cmd: >-
          midclt call certificate.create
          '{"name": "{{ truenas_cert_name }}",
            "create_type": "CERTIFICATE_CREATE_ACME",
            "csr_id": {{ _csr_id }},
            "acme_directory_uri": "{{ truenas_cert_acme_directory }}",
            "tos": true,
            "renew_days": 10,
            "dns_mapping": {{ _dns_mapping | to_json }}}'
      register: _acme_cert_create
      when: >-
        truenas_cert_name not in
        (_certs.stdout | from_json | map(attribute='name') | list)
      changed_when: true
      tags: [cert]

    - name: Wait for ACME certificate job to complete
      ansible.builtin.command:
        cmd: >-
          midclt call core.get_jobs '[["id", "=", {{ _acme_cert_create.stdout | from_json }}]]'
      register: _acme_job
      until: (_acme_job.stdout | from_json | first).state not in ['RUNNING', 'WAITING']
      retries: 60
      delay: 5
      when: _acme_cert_create is changed
      changed_when: false
      failed_when:
        - _acme_job is not skipped
        - (_acme_job.stdout | from_json | first).state != 'SUCCESS'
      tags: [cert]

    - name: Refresh certificate list for UI assignment
      ansible.builtin.command:
        cmd: >-
          midclt call certificate.query '[["name", "=", "{{ truenas_cert_name }}"]]'
      register: _cert_final
      changed_when: false
      check_mode: false
      tags: [cert]

    - name: Resolve ACME certificate ID
      ansible.builtin.set_fact:
        _cert_id: "{{ (_cert_final.stdout | from_json | first).id }}"
      tags: [cert]

    - name: Get current UI certificate
      ansible.builtin.command:
        cmd: midclt call system.general.config
      register: _sys_general_cert
      changed_when: false
      check_mode: false
      tags: [cert]

    - name: Set ACME certificate as active UI certificate
      ansible.builtin.command:
        cmd: "midclt call system.general.update '{\"ui_certificate\": {{ _cert_id }}}'"
      when: (_sys_general_cert.stdout | from_json).ui_certificate.id | default(0) != _cert_id | int
      changed_when: true
      notify: restart web ui
      tags: [cert]

    # ----- Cloud Sync (Backblaze B2) -----------------------------------------

    - name: Resolve B2 credential ID
      ansible.builtin.command:
        cmd: "midclt call cloudsync.credentials.query '[[\"name\", \"=\", \"{{ truenas_cloudsync_credential_name }}\"]]'"
      register: _b2_creds
      changed_when: false
      check_mode: false
      tags: [cloudsync]

    - name: Set B2 credential ID fact
      ansible.builtin.set_fact:
        _b2_cred_id: "{{ (_b2_creds.stdout | from_json | first).id }}"
      tags: [cloudsync]

    - name: Query existing cloud sync tasks
      ansible.builtin.command:
        cmd: midclt call cloudsync.query
      register: _cloudsync_tasks
      changed_when: false
      check_mode: false
      tags: [cloudsync]

    - name: Create cloud sync tasks
      ansible.builtin.command:
        cmd: >-
          midclt call cloudsync.create '{{ _payload | to_json }}'
      vars:
        _payload:
          description: "{{ item.description }}"
          path: "{{ item.path }}"
          credentials: "{{ _b2_cred_id | int }}"
          attributes:
            bucket: "{{ truenas_cloudsync_bucket }}"
            folder: "{{ item.folder }}"
          schedule:
            minute: "{{ item.minute }}"
            hour: "{{ item.hour }}"
            dom: "*"
            month: "*"
            dow: "*"
          snapshot: true
          enabled: true
          direction: PUSH
          transfer_mode: SYNC
          encryption: true
          filename_encryption: false
          encryption_password: "{{ truenas_cloudsync_encryption_password }}"
          encryption_salt: "{{ truenas_cloudsync_encryption_salt }}"
          transfers: 4
          follow_symlinks: true
          create_empty_src_dirs: false
      loop: "{{ truenas_cloudsync_tasks }}"
      loop_control:
        label: "{{ item.description }}"
      when: item.description not in (_cloudsync_tasks.stdout | from_json | map(attribute='description') | list)
      changed_when: true
      tags: [cloudsync]

    # ----- Config Backup Cron -------------------------------------------------

    - name: Query existing cron jobs (for config backup)
      ansible.builtin.command:
        cmd: midclt call cronjob.query
      register: _cronjobs_config
      changed_when: false
      check_mode: false
      tags: [config-backup]

    - name: Create TrueNAS config backup cron job
      ansible.builtin.command:
        cmd: >-
          midclt call cronjob.create '{{ _payload | to_json }}'
      vars:
        _payload:
          user: root
          command: >-
            DEST={{ truenas_config_backup_path }} &&
            mkdir -p $DEST &&
            cp /data/freenas-v1.db $DEST/freenas-v1-$(date +%Y%m%d).db &&
            cp /data/pwenc_secret $DEST/pwenc_secret &&
            find $DEST -name "freenas-v1-*.db" -mtime +{{ truenas_config_backup_retain_days }} -delete
          description: "TrueNAS config backup (daily, retain {{ truenas_config_backup_retain_days }}d)"
          enabled: true
          schedule:
            minute: "45"
            hour: "23"
            dom: "*"
            month: "*"
            dow: "*"
      when: >-
        (_cronjobs_config.stdout | from_json
         | selectattr('description', 'search', 'config backup')
         | list | length) == 0
      changed_when: true
      tags: [config-backup]

    # ----- UPS / NUT --------------------------------------------------------

    - name: Get current UPS config
      ansible.builtin.command:
        cmd: midclt call ups.config
      register: _ups_config
      changed_when: false
      check_mode: false
      tags: [ups]

    - name: Build UPS config payload
      ansible.builtin.set_fact:
        _ups_payload:
          mode: "{{ truenas_ups.mode }}"
          identifier: "{{ truenas_ups.identifier }}"
          driver: "{{ truenas_ups.driver }}"
          port: "{{ truenas_ups.port }}"
          monuser: "{{ truenas_ups.monuser }}"
          monpwd: "{{ truenas_ups.monpwd }}"
          shutdown: "{{ truenas_ups.shutdown }}"
          powerdown: "{{ truenas_ups.powerdown }}"
          rmonitor: "{{ truenas_ups.rmonitor }}"
          remoteport: "{{ truenas_ups.remoteport }}"
          hostsync: "{{ truenas_ups.hostsync }}"
          shutdowntimer: "{{ truenas_ups.shutdowntimer }}"
          nocommwarntime: "{{ truenas_ups.nocommwarntime }}"
      tags: [ups]

    - name: Configure UPS service (NUT server) # noqa: literal-compare
      ansible.builtin.command:
        cmd: "midclt call ups.update '{{ _ups_payload | to_json }}'"
      when: >-
        (_ups_config.stdout | from_json).driver != truenas_ups.driver or
        (_ups_config.stdout | from_json).mode != truenas_ups.mode or
        (_ups_config.stdout | from_json).identifier != truenas_ups.identifier or
        (_ups_config.stdout | from_json).rmonitor != truenas_ups.rmonitor
      changed_when: true
      tags: [ups]

    - name: Enable and start UPS service
      arensb.truenas.service:
        name: ups
        enabled: true
        state: started
      tags: [ups]

  handlers:
    - name: restart web ui
      ansible.builtin.command:
        cmd: midclt call system.general.ui_restart 0
      changed_when: true
